name: CI
# Branch pushes and PRs run this directly; tag pushes run it once, as the
# release workflow's test gate (workflow_call), instead of racing beside it.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_call:
permissions:
  contents: read
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # The plugin replaces github.com/agentcarto/core => ../agentcarto-core,
      # so check core out as a sibling.
      - uses: actions/checkout@v4
        with:
          path: plugin-grok
      - uses: actions/checkout@v4
        with: { repository: agentcarto/core, path: agentcarto-core }
      - uses: actions/setup-go@v5
        with:
          go-version-file: plugin-grok/go.mod
      - name: Build & test
        working-directory: plugin-grok
        run: |
          go build ./...
          go test ./...
      - name: Race test
        if: runner.os == 'Linux'
        working-directory: plugin-grok
        run: go test -race ./...
